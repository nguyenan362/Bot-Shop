<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}} — Start Admin</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333}
        .layout{display:flex;min-height:100vh}
        .sidebar{width:240px;background:#1a1a2e;color:#fff;padding:20px 0;position:fixed;height:100vh;overflow-y:auto}
        .sidebar h2{padding:0 20px 20px;border-bottom:1px solid #333;font-size:18px}
        .sidebar a{display:block;padding:12px 20px;color:#ccc;text-decoration:none;transition:background .2s}
        .sidebar a:hover{background:#16213e;color:#fff}
        .main{margin-left:240px;flex:1;padding:24px}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
        .header h1{font-size:24px}
        .card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
        .stat-card{background:#fff;border-radius:8px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
        .stat-card h3{font-size:14px;color:#666;margin-bottom:8px}
        .stat-card .value{font-size:28px;font-weight:bold;color:#1a1a2e}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #eee}
        th{background:#f8f9fa;font-weight:600;color:#555}
        tr:hover{background:#f8f9fa}
        .btn{display:inline-block;padding:8px 16px;border-radius:6px;text-decoration:none;font-size:14px;border:none;cursor:pointer;transition:opacity .2s}
        .btn-primary{background:#0066ff;color:#fff}
        .btn-danger{background:#dc3545;color:#fff}
        .btn-success{background:#28a745;color:#fff}
        .btn-sm{padding:4px 12px;font-size:12px}
        .btn:hover{opacity:.9}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;margin-bottom:6px;font-weight:500;color:#555}
        .form-group input,.form-group textarea,.form-group select{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
        .form-group textarea{min-height:100px;resize:vertical}
        .alert{padding:12px 16px;border-radius:6px;margin-bottom:16px}
        .alert-danger{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
        .alert-success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
        .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:500}
        .badge-success{background:#d4edda;color:#155724}
        .badge-warning{background:#fff3cd;color:#856404}
        .badge-danger{background:#f8d7da;color:#721c24}
        .actions{display:flex;gap:8px}
        .checkbox-group{display:flex;align-items:center;gap:8px}
        .checkbox-group input[type=checkbox]{width:auto}
        .btn-outline{background:#fff;color:#333;border:1px solid #ddd}
        .btn-outline:hover{background:#f0f0f0}
        code{font-family:'SFMono-Regular',Consolas,monospace}
    </style>
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <h2>🤖 Start</h2>
        <a href="/admin/dashboard">📊 Tổng quan</a>
        <a href="/admin/products">📦 Sản phẩm</a>
        <a href="/admin/orders">🛒 Đơn hàng</a>
        <a href="/admin/users">👥 Người dùng</a>
        <a href="/admin/deposits">💰 Nạp tiền</a>
        <a href="/admin/notes">📋 Lưu ý</a>
        <a href="/admin/binance">⚙️ Cấu hình Binance</a>
    </div>
    <div class="main">
        <div class="header"><h1>{{.Title}}</h1></div>
        {{embed}}
    </div>
</div>
</body>
</html>
