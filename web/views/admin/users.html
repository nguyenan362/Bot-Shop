<div class="card">
    <h2>Tất cả người dùng</h2>

    <form method="GET" action="/admin/users" style="display:flex;gap:8px;align-items:center;margin:12px 0 16px 0;">
        <input type="text" name="q" value="{{.Query}}" placeholder="Tìm theo Telegram ID hoặc username" style="max-width:360px;">
        <button type="submit" class="btn btn-sm btn-primary">Tìm kiếm</button>
        <a href="/admin/users" class="btn btn-sm btn-outline">Xóa lọc</a>
    </form>

    <table>
        <thead>
            <tr>
                <th>Telegram ID</th>
                <th>Username</th>
                <th>Số dư (USDT)</th>
                <th>Ngôn ngữ</th>
                <th>Admin</th>
                <th>Ngày tham gia</th>
            </tr>
        </thead>
        <tbody>
            {{range .Users}}
            <tr>
                <td>{{.TeleID}}</td>
                <td>@{{.Username}}</td>
                <td>{{.BalanceUSDT}}</td>
                <td>{{.Language}}</td>
                <td>{{if .IsAdmin}}<span class="badge badge-success">Có</span>{{else}}Không{{end}}</td>
                <td>{{.JoinDate.Format "2006-01-02"}}</td>
            </tr>
            {{else}}
            <tr><td colspan="6" style="text-align:center;color:#999">Chưa có người dùng nào</td></tr>
            {{end}}
        </tbody>
    </table>
</div>
