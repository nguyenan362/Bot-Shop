<div class="card">
    {{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}
    <form method="POST" action="{{.Action}}">
        <div class="form-group">
            <label>Nội dung (Tiếng Việt)</label>
            <textarea name="content_vi" required>{{if .Note}}{{.Note.ContentVI}}{{end}}</textarea>
        </div>
        <div class="form-group">
            <label>Nội dung (Tiếng Anh)</label>
            <textarea name="content_en" required>{{if .Note}}{{.Note.ContentEN}}{{end}}</textarea>
        </div>
        <div class="form-group checkbox-group">
            <input type="checkbox" name="active" id="active" {{if .Note}}{{if .Note.Active}}checked{{end}}{{else}}checked{{end}}>
            <label for="active" style="margin:0">Đang bật</label>
        </div>
        <div style="display:flex;gap:8px">
            <button type="submit" class="btn btn-primary">Lưu</button>
            <a href="/admin/notes" class="btn" style="background:#6c757d;color:#fff">Hủy</a>
        </div>
    </form>
</div>
