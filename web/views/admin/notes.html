<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2>Notes</h2>
        <a href="/admin/notes/new" class="btn btn-primary">+ New Note</a>
    </div>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Content (VI)</th>
                <th>Content (EN)</th>
                <th>Active</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .Notes}}
            <tr>
                <td>{{.ID}}</td>
                <td>{{.ContentVI}}</td>
                <td>{{.ContentEN}}</td>
                <td>{{if .Active}}<span class="badge badge-success">Active</span>{{else}}<span class="badge badge-danger">Inactive</span>{{end}}</td>
                <td class="actions">
                    <a href="/admin/notes/{{.ID}}/edit" class="btn btn-primary btn-sm">Edit</a>
                    <form method="POST" action="/admin/notes/{{.ID}}/delete" style="display:inline" onsubmit="return confirm('Delete this note?')">
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>
            {{else}}
            <tr><td colspan="5" style="text-align:center;color:#999">No notes yet</td></tr>
            {{end}}
        </tbody>
    </table>
</div>
