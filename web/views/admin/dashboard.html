<div class="stats-grid">
    <div class="stat-card">
        <h3>Total Users</h3>
        <div class="value">{{.Stats.TotalUsers}}</div>
    </div>
    <div class="stat-card">
        <h3>Successful Orders</h3>
        <div class="value">{{.Stats.TotalOrders}}</div>
    </div>
    <div class="stat-card">
        <h3>Total Revenue (USDT)</h3>
        <div class="value">{{.Stats.TotalRevenue}}</div>
    </div>
    <div class="stat-card">
        <h3>Total Deposits (USDT)</h3>
        <div class="value">{{.Stats.TotalDeposits}}</div>
    </div>
</div>
