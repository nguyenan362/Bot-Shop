<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Bot Shop Admin</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100vh}
        .login-card{background:#fff;border-radius:12px;padding:40px;width:360px;box-shadow:0 4px 20px rgba(0,0,0,.3)}
        .login-card h1{text-align:center;margin-bottom:24px;color:#1a1a2e}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;margin-bottom:6px;font-weight:500;color:#555}
        .form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:6px;font-size:14px}
        .btn{width:100%;padding:12px;background:#0066ff;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer}
        .btn:hover{opacity:.9}
        .alert{padding:10px;border-radius:6px;margin-bottom:16px;background:#f8d7da;color:#721c24;border:1px solid #f5c6cb;text-align:center}
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🤖 Bot Shop Admin</h1>
        {{if .Error}}<div class="alert">{{.Error}}</div>{{end}}
        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label>Telegram ID</label>
                <input type="text" name="tele_id" placeholder="Enter your Telegram ID" required>
            </div>
            <button type="submit" class="btn">Login</button>
        </form>
    </div>
</body>
</html>
